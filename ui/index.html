<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WordGrab</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">

  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="253.5 250 576 576" width="30" height="30" xmlns="http://www.w3.org/2000/svg" aria-label="WordGrab logo">
          <defs><clipPath id="disc"><circle cx="541.5" cy="538" r="288"></circle></clipPath></defs>
          <circle cx="541.5" cy="538" r="288" fill="#191919"></circle>
          <g clip-path="url(#disc)">
            <path d="M 527 433.62 L 559 433.62 C 572.95 433.62 576.05 439.62 590 439.62 L 815.6 439.62 L 815.6 447.62 L 590 447.62 C 576.05 447.62 572.95 453.62 559 453.62 L 527 453.62 A 26 10 0 0 1 527 433.62 Z" fill="#FF5C4D"></path>
            <path d="M 480.5 457.5 L 611 457.5 C 622.7 457.5 625.3 463.5 637 463.5 L 822.61 463.5 L 822.61 470.5 L 637 470.5 C 625.3 470.5 622.7 476.5 611 476.5 L 480.5 476.5 A 9.5 9.5 0 0 1 480.5 457.5 Z" fill="#FF9F1C"></path>
            <path d="M 461.5 481.48 L 636 481.48 C 644.55 481.48 646.45 486.98 655 486.98 L 827.64 486.98 L 827.64 494.98 L 655 494.98 C 646.45 494.98 644.55 500.48 636 500.48 L 461.5 500.48 A 9.5 9.5 0 0 1 461.5 481.48 Z" fill="#FFD23F"></path>
            <path d="M 451 504.48 L 643 504.48 C 655.15 504.48 657.85 510.48 670 510.48 L 830.54 510.48 L 830.54 518.48 L 670 518.48 C 657.85 518.48 655.15 524.48 643 524.48 L 451 524.48 A 10 10 0 0 1 451 504.48 Z" fill="#FFD23F"></path>
            <path d="M 445.5 528.51 L 650 528.51 C 658.1 528.51 659.9 534.01 668 534.01 L 831.5 534.01 L 831.5 542.01 L 668 542.01 C 659.9 542.01 658.1 547.51 650 547.51 L 445.5 547.51 A 9.5 9.5 0 0 1 445.5 528.51 Z" fill="#2EC4B6"></path>
            <path d="M 450.5 552.5 L 647 552.5 C 658.7 552.5 661.3 558.5 673 558.5 L 830.5 558.5 L 830.5 565.5 L 673 565.5 C 661.3 565.5 658.7 571.5 647 571.5 L 450.5 571.5 A 9.5 9.5 0 0 1 450.5 552.5 Z" fill="#3A86FF"></path>
            <path d="M 461.5 576.48 L 635 576.48 C 644 576.48 646 581.98 655 581.98 L 827.47 581.98 L 827.47 589.98 L 655 589.98 C 646 589.98 644 595.48 635 595.48 L 461.5 595.48 A 9.5 9.5 0 0 1 461.5 576.48 Z" fill="#8338EC"></path>
            <path d="M 480 600.5 L 615 600.5 C 623.1 600.5 624.9 605.5 633 605.5 L 822.48 605.5 L 822.48 613.5 L 633 613.5 C 624.9 613.5 623.1 618.5 615 618.5 L 480 618.5 A 9 9 0 0 1 480 600.5 Z" fill="#8338EC"></path>
            <path d="M 530 623.12 L 567 623.12 C 578.25 623.12 580.75 629.62 592 629.62 L 815.34 629.62 L 815.34 636.62 L 592 636.62 C 580.75 636.62 578.25 643.12 567 643.12 L 530 643.12 A 29 10 0 0 1 530 623.12 Z" fill="#FF4D8D"></path>
          </g>
        </svg>
      </div>
      <span>WordGrab</span>
    </div>

    <button id="importBtn" class="btn-primary">
      <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M11 5a1 1 0 1 1 2 0v6h6a1 1 0 1 1 0 2h-6v6a1 1 0 1 1-2 0v-6H5a1 1 0 1 1 0-2h6V5z"/></svg>
      导入音频
    </button>

    <div class="search-wrap">
      <input id="sideSearch" placeholder="搜索记录…" autocomplete="off">
    </div>

    <div id="historyList" class="history"></div>
  </aside>

  <!-- 主区 -->
  <main class="main">
    <!-- 空态 -->
    <div id="empty" class="empty">
      <div class="empty-illu">🎧</div>
      <h2>把录音变成文字稿</h2>
      <p>点击左上角「导入音频」，或把文件拖进窗口<br>中文高精度 · 自动区分说话人 · 全程本地</p>
      <button id="importBtn2" class="btn-primary lg">导入音频</button>
    </div>

    <!-- 内容 -->
    <div id="content" class="content hidden">
      <header class="doc-head">
        <div class="doc-title">
          <h1 id="docTitle" title="双击改名"></h1>
          <div class="doc-meta"><span id="docMeta"></span></div>
          <div id="spkBar" class="spk-bar"></div>
        </div>
        <div class="doc-actions">
          <div class="mini-search">
            <input id="docSearch" placeholder="全文搜索…" autocomplete="off">
            <span id="searchCount" class="search-count"></span>
          </div>
          <button id="exportBtn" class="btn-ghost">导出 txt</button>
          <button id="deleteBtn" class="btn-ghost danger">删除</button>
        </div>
      </header>

      <div id="liveBanner" class="live-banner hidden"></div>

      <div id="transcript" class="transcript"></div>

      <!-- 播放器 -->
      <div class="player">
        <button id="playBtn" class="play-btn" aria-label="播放">
          <svg id="playIcon" viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
        </button>
        <span id="curTime" class="time">00:00</span>
        <input id="seek" class="seek" type="range" min="0" max="1000" value="0">
        <span id="totTime" class="time">00:00</span>
        <button id="speedBtn" class="speed">1.0×</button>
      </div>
    </div>

    <!-- 进度遮罩 -->
    <div id="progress" class="progress hidden">
      <div class="progress-card">
        <div class="spinner"></div>
        <div id="progTitle" class="prog-title">正在转写…</div>
        <div id="progStage" class="prog-stage"></div>
        <div class="prog-bar"><div id="progFill" class="prog-fill"></div></div>
        <div id="progElapsed" class="prog-elapsed"></div>
      </div>
    </div>
  </main>

</div>

<div id="dropHint" class="drop-hint hidden">
  <div class="drop-hint-card">
    <div class="drop-hint-icon">🎧</div>
    <div class="drop-hint-text">松开鼠标，开始转写</div>
  </div>
</div>

<audio id="audio"></audio>
<div id="toast" class="toast"></div>
<script src="/static/app.js"></script>
</body>
</html>
