name: Build Windows release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to receive the Windows ZIP
        required: true
        default: v1.2.0
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --clean WordGrab.spec

      - name: Package Windows app
        shell: pwsh
        run: Compress-Archive -Path dist\WordGrab -DestinationPath WordGrab-${{ inputs.release_tag || github.ref_name }}-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WordGrab-${{ github.ref_name }}-Windows
          path: WordGrab-${{ inputs.release_tag || github.ref_name }}-Windows.zip

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ inputs.release_tag || github.ref_name }} WordGrab-${{ inputs.release_tag || github.ref_name }}-Windows.zip --clobber
